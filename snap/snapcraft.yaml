name: meshcore-grpc-gateway
base: core24
version: "1.0.0"
summary: gRPC server bridging MeshCore radio nodes over serial
description: |
  Exposes a gRPC interface (SendMessage, ReceiveMessage, Reset,
  CreateContact, SearchContact, DeleteContact, Health check) backed by
  a MeshCore companion radio node connected via serial port.
source-code: https://github.com/kevinlutzer/MeshCoreGRPCGateway
website: https://github.com/kevinlutzer/MeshCoreGRPCGateway
license: Apache-2.0

grade: stable
confinement: strict

apps:
  cli:
    command: bin/cli
    plugs: [network]

  server:
    command: bin/server
    daemon: simple
    restart-condition: on-failure
    plugs: [network, serial-port, gpio-control]

parts:
  meshcore-grpc-gateway:
    plugin: rust
    source: meshcore-grpc-gateway
    build-packages:
      - pkg-config
      - libssl-dev
      - protobuf-compiler
      - libdbus-1-dev

    organize:
      cli: bin/cli
      server: bin/server
