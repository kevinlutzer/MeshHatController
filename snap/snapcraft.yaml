name: meshhat-controller
base: core26
version: "1.0.0-pr"
summary: gRPC server bridging MeshCore radio nodes over serial
description: |
  Exposes a gRPC interface (SendMessage, ReceiveMessage, Reset,
  CreateContact, SearchContact, DeleteContact, Health check) backed by
  a MeshCore companion radio node connected via serial port.

grade: stable
confinement: strict

apps:
  cli:
    command: bin/cli
    plugs: [network]

  server:
    command: bin/server
    daemon: simple
    restart-condition: on-failure
    plugs: [network, serial-port, gpio-control]

parts:
  meshhat-controller:
    plugin: rust
    source: meshhat-controller
    build-packages:
      - pkg-config
      - libssl-dev
      - protobuf-compiler
      - libdbus-1-dev
      - libgpiod2t64
    stage-packages:
      - libssl3
      - libgpiod2t64
    organize:
      cli: bin/cli
      server: bin/server
