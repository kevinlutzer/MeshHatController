
name: PR
 
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt-lint-build:
    name: Format check, lint, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler libssl3 libdbus-1-dev pkg-config
 
      - name: Check formatting
        run: cargo fmt --all -- --check
    
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build (release)
        run: cargo build --release --all-features

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

  snap:
    name: Snap build (LXD)
    runs-on: ubuntu-24.04-arm
    needs: [fmt-lint-build]
    steps:
      - uses: actions/checkout@v4
 
      # snapcraft needs LXD; the canonical action wires everything up:
      # installs snapcraft, initialises LXD, and sets the build provider.
      - name: Install Snapcraft
        uses: snapcore/action-build@v1
        id: snap-build
        with:
          snapcraft-channel: latest/edge