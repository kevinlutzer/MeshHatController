
name: PR
 
on:
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt-lint-build:
    name: Format check, lint, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Install stable toolchain with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev protobuf-compiler libssl3 libdbus-1-dev pkg-config
 
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: ./meshcore-grpc-gateway
    
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: ./meshcore-grpc-gateway

      - name: Build (release)
        run: cargo build --release --all-features
        working-directory: ./meshcore-grpc-gateway

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-
            ${{ runner.os }}-cargo-

  snap-arm64:
    name: Snap build (LXD) ARM64
    runs-on: ubuntu-24.04-arm
    needs: [fmt-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Update version with build ID
        run: |
            current=$(grep -oP "^version: '?\K[^'\s]+" snap/snapcraft.yaml | sed 's/-alpha.*//')
            sed -i "s/^version:.*/version: '${current}-alpha.${{ github.run_number }}'/" snap/snapcraft.yaml

      # snapcraft needs LXD; the canonical action wires everything up:
      # installs snapcraft, initialises LXD, and sets the build provider.
      - name: Install Snapcraft
        uses: snapcore/action-build@v1
        id: snap-build
        with:
          snapcraft-channel: latest/edge

      - name: Upload snap build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snap-build-artifacts-arm64
          path: "*.snap"

  snap-amd64:
    name: Snap build (LXD) AMD64
    runs-on: ubuntu-24.04
    needs: [fmt-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Update version with build ID
        run: |
            current=$(grep -oP "^version: '?\K[^'\s]+" snap/snapcraft.yaml | sed 's/-alpha.*//')
            sed -i "s/^version:.*/version: '${current}-alpha.${{ github.run_number }}'/" snap/snapcraft.yaml

      # snapcraft needs LXD; the canonical action wires everything up:
      # installs snapcraft, initialises LXD, and sets the build provider.
      - name: Install Snapcraft
        uses: snapcore/action-build@v1
        id: snap-build
        with:
          snapcraft-channel: latest/edge

      - name: Upload snap build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snap-build-artifacts-amd64
          path: "*.snap"